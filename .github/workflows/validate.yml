name: Validate Formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"

jobs:
  validate:
    name: Audit, style, install, and test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Tap local checkout
        run: brew tap deployah-dev/tap .

      - name: Audit
        run: brew audit --strict deployah-dev/tap/deployah

      - name: Style
        run: brew style deployah-dev/tap/deployah

      - name: Install
        run: brew install deployah-dev/tap/deployah

      - name: Test
        run: brew test deployah-dev/tap/deployah
